<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chicago Live Music Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f17;
    --panel: #111826;
    --panel-2: #161f30;
    --border: #1f2a40;
    --text: #e6ebf5;
    --muted: #8a93a6;
    --accent: #1DB954;       /* Spotify green */
    --accent-2: #ff6b35;     /* warm highlight */
    --shadow: 0 10px 30px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* Layout */
  .app { display: grid; grid-template-columns: 360px 1fr; height: 100vh; }
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { max-height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
  }

  /* Sidebar */
  .sidebar {
    background: linear-gradient(180deg, var(--panel) 0%, #0d1422 100%);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .brand {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .brand h1 {
    margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  .brand h1 .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 14px var(--accent);
  }
  .brand p { margin: 6px 0 0; color: var(--muted); font-size: 12px; }

  .search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    font-size: 13px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,185,84,.15); }
  .search-wrap { position: relative; }
  .search-wrap::before {
    content: "🔍"; position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%); font-size: 13px; opacity: .6;
  }

  .venue-list { flex: 1; overflow-y: auto; padding: 8px; }
  .venue-list::-webkit-scrollbar { width: 8px; }
  .venue-list::-webkit-scrollbar-thumb { background: #243049; border-radius: 4px; }

  .venue {
    padding: 12px 14px; border-radius: 10px; cursor: pointer;
    transition: background .15s, transform .15s;
    border: 1px solid transparent;
  }
  .venue:hover { background: var(--panel-2); border-color: var(--border); }
  .venue.active {
    background: linear-gradient(135deg, rgba(29,185,84,.12), rgba(255,107,53,.06));
    border-color: rgba(29,185,84,.4);
  }
  .venue h3 {
    margin: 0 0 4px; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .venue h3 .badge {
    font-size: 10px; font-weight: 600;
    background: rgba(29,185,84,.15); color: var(--accent);
    padding: 2px 6px; border-radius: 999px;
    border: 1px solid rgba(29,185,84,.3);
  }
  .venue p { margin: 0; font-size: 12px; color: var(--muted); }

  .empty { padding: 30px 16px; text-align: center; color: var(--muted); font-size: 13px; }

  /* Map */
  #map { height: 100%; width: 100%; background: #0b0f17; }
  .leaflet-container { font-family: 'Inter', sans-serif; }

  /* Custom marker */
  .pin {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #14893f);
    border: 2px solid #fff; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(0,0,0,.5);
    transition: transform .2s;
  }
  .pin span { transform: rotate(45deg); color: #fff; font-size: 16px; }
  .pin:hover { transform: rotate(-45deg) scale(1.1); }
  .pin.active { background: linear-gradient(135deg, var(--accent-2), #c94a1f); }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: var(--panel);
    color: var(--text);
    border-radius: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 0;
  }
  .leaflet-popup-tip { background: var(--panel); border: 1px solid var(--border); }
  .leaflet-popup-content { margin: 0; width: 300px !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; padding: 8px !important; }

  .pop { padding: 16px; }
  .pop h4 { margin: 0 0 2px; font-size: 16px; font-weight: 700; color: var(--text); }
  .pop .addr { margin: 0 0 12px; font-size: 11px; color: var(--muted); }
  .pop .tracks { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .pop .tracks::-webkit-scrollbar { width: 6px; }
  .pop .tracks::-webkit-scrollbar-thumb { background: #243049; border-radius: 3px; }
  .track { background: var(--panel-2); border-radius: 8px; padding: 8px; }
  .track .artist { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .track iframe { border-radius: 8px; display: block; width: 100%; height: 80px; border: 0; }
  .track .nolink { font-size: 11px; color: var(--muted); font-style: italic; }

  /* Tooltip */
  .leaflet-tooltip {
    background: var(--panel) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    box-shadow: var(--shadow) !important;
    border-radius: 8px !important;
    font-size: 12px !important;
    font-weight: 500 !important;
    padding: 6px 10px !important;
  }
  .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before,
  .leaflet-tooltip-left:before, .leaflet-tooltip-right:before { display: none; }

  .leaflet-control-zoom a {
    background: var(--panel) !important; color: var(--text) !important;
    border: 1px solid var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--panel-2) !important; }
  .leaflet-control-attribution {
    background: rgba(11,15,23,.8) !important; color: var(--muted) !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1><span class="dot"></span> Chicago Live Music</h1>
      <p id="count">Loading venues…</p>
    </div>
    <div class="search">
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search venues or artists…" />
      </div>
    </div>
    <div class="venue-list" id="list"></div>
  </aside>
  <div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const VENUES = [{"name": "Beat Kitchen", "addr": "2100 W Belmont Ave", "lat": 41.93972, "lng": -87.68095, "tracks": [{"artist": "Demi the Daredevil", "id": "4JjwDXcwb2Yr9wRlAVOveK"}, {"artist": "Madame Reaper", "id": "4psvEo93nbFydKbPBS901S"}]}, {"name": "Byline Bank Aragon Ballroom", "addr": "1106 W. Lawrence Ave.", "lat": 41.96926, "lng": -87.65795, "tracks": [{"artist": "Hayley Williams", "id": "5iALdwbhnUHa8zGStA3h1J"}]}, {"name": "Chicago Shakespeare Theater", "addr": "At Navy Pier, 600 E Grand Ave", "lat": 41.89165, "lng": -87.60954, "tracks": [{"artist": "The Merry Wives Of Windsor", "id": "6uu4wn0YQDSDJsepPtPnmN"}]}, {"name": "City Winery Chicago", "addr": "1200 W. Randolph St.", "lat": 41.88459, "lng": -87.65711, "tracks": [{"artist": "Howie Day", "id": "6dwkFmLUz6hx2CZG2EqLol"}, {"artist": "Sean Skyler", "id": "24Q7n8TtvM4jmISY7vWmO4"}]}, {"name": "Constellation Chicago", "addr": "3111 N. Western Avenue", "lat": 41.93809, "lng": -87.68766, "tracks": [{"artist": "Stephan Crump", "id": "7H4J5SduUHQQrKO3eYmylv"}, {"artist": "Stephan Crump Slow Water", "id": null}]}, {"name": "FitzGerald's", "addr": "6615 Roosevelt Rd.", "lat": 41.86513, "lng": -87.78969, "tracks": [{"artist": "Peter Case", "id": "1FgQnc7KZLvaB89eWOfQ2R"}, {"artist": "Zack Keim", "id": "1WvK5CeK3fMSw8qYyM34Xb"}]}, {"name": "Garcia's Chicago", "addr": "1001 W Washington Blvd", "lat": 41.88279, "lng": -87.65249, "tracks": [{"artist": "The Ultimate Doors", "id": null}]}, {"name": "Hungry Brain", "addr": "2319 W. Belmont", "lat": 41.93931, "lng": -87.68643, "tracks": [{"artist": "Ted Sirota", "id": "3LjLnBBYW03EB0omvXM8Vi"}]}, {"name": "Liar's Club", "addr": "1665 W. Fullerton Ave.", "lat": 41.92502, "lng": -87.67061, "tracks": [{"artist": "Friend", "id": "4EtgDIWb8Wm5mnaK701c0C"}, {"artist": "Constant Headache", "id": "07IfJ7LpbYLX5EWF5gYTSD"}]}, {"name": "Lincoln Hall", "addr": "2424 N Lincoln Ave", "lat": 41.92605, "lng": -87.64975, "tracks": [{"artist": "Grace Ives", "id": "0PiSok4AgEcnVSWSGiz86p"}]}, {"name": "Pianoforte Chicago", "addr": "1335 S. Michigan Ave.", "lat": 41.86477, "lng": -87.62367, "tracks": [{"artist": "Markus Rutz", "id": "1c5mVzfztVVEB9LCrZJsgv"}]}, {"name": "Reggie's", "addr": "2105 S. State St.", "lat": 41.85398, "lng": -87.62707, "tracks": []}, {"name": "Reggie's Rock Club", "addr": "2109 South State Street", "lat": 41.85405, "lng": -87.62695, "tracks": [{"artist": "Stick Men", "id": "2Eu0LnXKYFjQCGaNn62yEM"}]}, {"name": "Rosa's Lounge", "addr": "3420 W. Armitage Ave.", "lat": 41.9176, "lng": -87.71278, "tracks": [{"artist": "giuliobrouzet", "id": null}]}, {"name": "Rosemont Theatre", "addr": "5400 North River Road", "lat": 41.97623, "lng": -87.86434, "tracks": [{"artist": "Blessd", "id": "3jqk4fue7CILssCv8UpJe0"}]}, {"name": "SPACE", "addr": "1245 Chicago Avenue", "lat": 42.04087, "lng": -87.68011, "tracks": [{"artist": "Ana Popovic", "id": "1GwzJMfSqoNDptZA5GHKqp"}]}, {"name": "Shed, The Salt Shed (Indoors)", "addr": "1357 N. Elston Ave.", "lat": 41.90692, "lng": -87.65962, "tracks": [{"artist": "Bob Moses", "id": "40tPP3K10yMZxwnT65REKj"}, {"artist": "CANNONS", "id": "4o0LyB69tylqDG6eTGhmig"}, {"artist": "Oxis", "id": "1Vmcab9Dmw2rX1GEC1t2Po"}]}, {"name": "Subterranean", "addr": "2011 W. North Ave", "lat": 41.91027, "lng": -87.67797, "tracks": [{"artist": "Poison Ru\u00efn", "id": "569PU1VDhtz4dngaUwvUaC"}, {"artist": "Cruelster", "id": "4jlZFpwIoA1Wi9spkoBecv"}, {"artist": "MANEATERS", "id": "1rrhigaHj1cAckoPQbXXUf"}, {"artist": "Lost Legion", "id": "4TbSfd8u219SCl7Yo76lzu"}, {"artist": "Doom Gong", "id": "6UzR2YGkVR4lOBNC11CjQs"}, {"artist": "The Moon Goons", "id": "29gKawHoWmVVS85tqDC5dd"}]}, {"name": "The Burlington", "addr": "Logan Square \u2014 3425 W. Fullerton Ave.", "lat": 41.92435, "lng": -87.71318, "tracks": [{"artist": "It Is", "id": "1Xy4MhaKG16hywIilQaiL6"}]}, {"name": "The Empty Bottle", "addr": "1035 North Western Avenue", "lat": 41.90046, "lng": -87.68664, "tracks": [{"artist": "Diagonal", "id": "6IZrWKNy07OMGLKU24KJhQ"}, {"artist": "High Tatras", "id": "3DMhHU13lb2mY367xCmV25"}, {"artist": "Western", "id": "2TxxebCGQhY88MtdJrKnPO"}]}];

const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([41.8950, -87.6700], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);

const markers = {};
let activeIdx = null;

function makeIcon(active) {
  return L.divIcon({
    className: '',
    html: `<div class="pin ${active ? 'active' : ''}"><span>♪</span></div>`,
    iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36], tooltipAnchor: [12, -18]
  });
}

function popupHTML(v) {
  const tracks = v.tracks.length ? v.tracks.map(t => `
    <div class="track">
      <div class="artist">${escapeHtml(t.artist)}</div>
      ${t.id
        ? `<iframe src="https://open.spotify.com/embed/track/${t.id}?utm_source=generator&theme=0" loading="lazy" allow="encrypted-media"></iframe>`
        : `<div class="nolink">No Spotify track found</div>`}
    </div>`).join('') : `<div class="nolink">No tracks listed</div>`;
  return `<div class="pop">
    <h4>${escapeHtml(v.name)}</h4>
    <p class="addr">${escapeHtml(v.addr)}</p>
    <div class="tracks">${tracks}</div>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

VENUES.forEach((v, i) => {
  const m = L.marker([v.lat, v.lng], { icon: makeIcon(false) }).addTo(map);
  m.bindTooltip(v.name, { sticky: true, direction: 'right', offset: [12, -18] });
  m.bindPopup(popupHTML(v), { maxWidth: 320, minWidth: 300, autoPanPadding: [40, 40] });
  m.on('click', () => setActive(i, false));
  markers[i] = m;
});

function setActive(i, fly = true) {
  if (activeIdx !== null && markers[activeIdx]) markers[activeIdx].setIcon(makeIcon(false));
  activeIdx = i;
  markers[i].setIcon(makeIcon(true));
  document.querySelectorAll('.venue').forEach(el => el.classList.toggle('active', +el.dataset.idx === i));
  const el = document.querySelector(`.venue[data-idx="${i}"]`);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  if (fly) {
    map.flyTo([VENUES[i].lat, VENUES[i].lng], 15, { duration: 0.8 });
    setTimeout(() => markers[i].openPopup(), 600);
  }
}

const list = document.getElementById('list');
const search = document.getElementById('search');
const count = document.getElementById('count');

function render(filter = '') {
  const q = filter.trim().toLowerCase();
  const filtered = VENUES.map((v, i) => ({ v, i })).filter(({ v }) => {
    if (!q) return true;
    if (v.name.toLowerCase().includes(q) || v.addr.toLowerCase().includes(q)) return true;
    return v.tracks.some(t => t.artist.toLowerCase().includes(q));
  });
  count.textContent = `${filtered.length} venue${filtered.length === 1 ? '' : 's'} • ${VENUES.reduce((a,v)=>a+v.tracks.length,0)} tracks`;
  list.innerHTML = filtered.length ? filtered.map(({ v, i }) => `
    <div class="venue ${i === activeIdx ? 'active' : ''}" data-idx="${i}">
      <h3>${escapeHtml(v.name)} ${v.tracks.length ? `<span class="badge">${v.tracks.length}</span>` : ''}</h3>
      <p>${escapeHtml(v.addr)}</p>
    </div>`).join('') : `<div class="empty">No venues match "${escapeHtml(filter)}"</div>`;
  list.querySelectorAll('.venue').forEach(el => {
    el.addEventListener('click', () => setActive(+el.dataset.idx, true));
  });
}

search.addEventListener('input', e => render(e.target.value));
render();
</script>
</body>
</html>
